<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milney Sound Cash v2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 360px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #00adb5; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #252525; border: 1px solid #00adb5; color: white; border-radius: 8px; font-size: 16px; text-align: center; }
        button { width: 95%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-term { background: #00adb5; color: white; }
        .btn-pay { background: #393e46; color: white; border: 2px solid #00adb5; }
        #statusz { margin-top: 20px; padding: 15px; background: #252525; border-radius: 8px; font-size: 14px; min-height: 40px; border-left: 5px solid #00adb5; }
        .egyenleg { font-size: 24px; color: #28c76f; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>Milney Sound Pay v2</h1>
    
    <div class="egyenleg">Közös Banki Egyenleg: <span id="egyenlegKijelzo">5000</span> Ft</div>
    <hr style="border-color: #333;">

    <h3>[ 1. Telefon: FIZETŐ ]</h3>
    <button class="btn-pay" onclick="fizessHanggal()">FIZETÉS (Hangjelzés küldése)</button>

    <h3>[ 2. Telefon: TERMINÁL ]</h3>
    <input type="number" id="osszegInput" placeholder="Levonandó összeg (Ft)" value="1000">
    <button class="btn-term" onclick="inditTerminalHallgato()">Terminál indítása (Hallgatózás)</button>

    <div id="statusz">Indítsd el a rendszert! Közelítsd a telefonokat a hanghoz!</div>
</div>

<script>
    // Nyilvános, ingyenes teszt adatbázis konfiguráció, hogy azonnal működjön nektek
    const firebaseConfig = {
        databaseURL: "https://milney-test-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const adatbazis = firebase.database().ref("szamla");

    let hallgatozik = false;

    // AMIKOR VÁLTOZIK AZ ADATBÁZIS, AZONNAL FRISSÍT MINDKÉT KIJELZŐN
    adatbazis.on('value', (snapshot) => {
        const aktualisEgyenleg = snapshot.val() || 5000;
        document.getElementById('egyenlegKijelzo').innerText = aktualisEgyenleg;
    });

    // 1. TELEFON: FIZETŐ (Hangot ad ki)
    function fizessHanggal() {
        document.getElementById('statusz').innerHTML = "🔊 Fizetési hang kód küldése...";
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(850, audioCtx.currentTime); 
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5); 
    }

    // 2. TELEFON: TERMINÁL (Figyeli a mikrofont)
    async function inditTerminalHallgato() {
        const levonando = parseInt(document.getElementById('osszegInput').value);
        if(!levonando || levonando <= 0) { alert("Írj be összeget!"); return; }

        document.getElementById('statusz').innerHTML = "👂 A terminál fülel... Nyomd meg a másik telefonon a Fizetést!";
        hallgatozik = true;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function vizsgal() {
                if (!hallgatozik) return;
                analyser.getByteFrequencyData(dataArray);

                const sampleRate = audioCtx.sampleRate;
                const bin = Math.round(850 / (sampleRate / analyser.fftSize));
                const hangero = dataArray[bin];

                // Ha érzékeli a hangot (elég hangos közelről)
                if (hangero > 180) { 
                    hallgatozik = false; 
                    stream.getTracks().forEach(track => track.stop()); // Mikrofon leállít

                    document.getElementById('statusz').innerHTML = "🎵 Hang észlelve! Levonás folyamatban...";
                    
                    // KÖZVETLENÜL MÓDOSÍTJUK AZ ONLINE ADATBÁZIST
                    adatbazis.once('value').then((snapshot) => {
                        let regiEgyenleg = snapshot.val() || 5000;
                        let ujEgyenleg = regiEgyenleg - levonando;
                        
                        // Elmentjük a felhőbe
                        adatbazis.set(ujEgyenleg).then(() => {
                            document.getElementById('statusz').innerHTML = `✅ <b>Sikeres levonás!</b><br>Elvonva: ${levonando} Ft.`;
                        });
                    });
                }
                requestAnimationFrame(vizsgal);
            }
            vizsgal();

        } catch (err) {
            document.getElementById('statusz').innerHTML = "Mikrofon hiba: " + err;
        }
    }
</script>

</body>
</html>
