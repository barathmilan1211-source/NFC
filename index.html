<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milney Sound Cash</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 360px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #00adb5; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #252525; border: 1px solid #00adb5; color: white; border-radius: 8px; font-size: 16px; text-align: center; }
        button { width: 95%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-term { background: #00adb5; color: white; }
        .btn-pay { background: #393e46; color: white; border: 2px solid #00adb5; }
        #statusz { margin-top: 20px; padding: 15px; background: #252525; border-radius: 8px; font-size: 14px; min-height: 40px; border-left: 5px solid #00adb5; }
        .egyenleg { font-size: 24px; color: #28c76f; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>Milney Sound Pay</h1>
    
    <div class="egyenleg">Egyenleg: <span id="egyenlegKijelzo">5000</span> Ft</div>
    <hr style="border-color: #333;">

    <h3>[ 1. Telefon: FIZETŐ ]</h3>
    <button class="btn-pay" onclick="fizessHanggal()">FIZETÉS (Hangjelzés küldése)</button>

    <h3>[ 2. Telefon: TERMINÁL ]</h3>
    <input type="number" id="osszegInput" placeholder="Levonandó összeg (Ft)" value="1000">
    <button class="btn-term" onclick="inditTerminalHallgato()">Terminál indítása (Hallgatózás)</button>

    <div id="statusz">Indítsd el a rendszert! Közelítsd a telefonokat a hanghoz!</div>
</div>

<script>
    let egyenleg = 5000;
    let hallgatozik = false;

    // Online hálózati szinkronizáció
    const pubnub = new PubNub({
        publishKey: "pub-c-cb677fa9-0d1a-4933-bfdd-a01c80145217",
        subscribeKey: "sub-c-497df57a-9bb7-11eb-bc5a-a2ff7d4dfbf7",
        uuid: "sound_user_" + Math.floor(Math.random() * 1000)
    });
    pubnub.subscribe({ channels: ['milney_sound_channel'] });

    // 1. TELEFON: FIZETŐ (Hangot ad ki)
    function fizessHanggal() {
        document.getElementById('statusz').innerHTML = "🔊 Fizetési hang kód küldése...";
        
        // Létrehozunk egy nagyon jellegzetes 850 Hz-es sípoló hangot, ami 0.5 másodpercig tart
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(850, audioCtx.currentTime); // 850 Hz a titkos kódunk frekvenciája
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5); // Fél másodpercig sípol
    }

    // 2. TELEFON: TERMINÁL (Figyeli a mikrofont)
    async function inditTerminalHallgato() {
        const levonando = parseInt(document.getElementById('osszegInput').value);
        if(!levonando || levonando <= 0) { alert("Írj be összeget!"); return; }

        document.getElementById('statusz').innerHTML = "👂 A terminál fülel... Nyújtsd ide a fizető telefont és nyomd meg rajta a Fizetést!";
        hallgatozik = true;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            
            // Frekvencia analizátor beállítása
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function vizsgal() {
                if (!hallgatozik) return;
                analyser.getByteFrequencyData(dataArray);

                // Megnézzük a 850 Hz-es frekvenciasávot az audió spektrumban
                const sampleRate = audioCtx.sampleRate;
                const bin = Math.round(850 / (sampleRate / analyser.fftSize));
                const hangerő = dataArray[bin];

                // Ha a hang elég hangos (tehát a telefon max 5-10 centire van a mikrofontól!)
                if (hangerő > 180) { 
                    hallgatozik = false; // Leállítjuk a hallgatózást, megvan a találat
                    stream.getTracks().forEach(track => track.stop()); // Mikrofon lekapcsolása

                    document.getElementById('statusz').innerHTML = "🎵 Hang kód észlelve közvetlen közelről!";
                    
                    // Küldjük az online jelet, hogy vonja le a pénzt
                    pubnub.publish({
                        channel: 'milney_sound_channel',
                        message: { tipus: "SOUND_FIZETES_OK", osszeg: levonando }
                    });
                }
                requestAnimationFrame(vizsgal);
            }
            vizsgal();

        } catch (err) {
            document.getElementById('statusz').innerHTML = "Mikrofon hozzáférés megtagadva vagy hiba: " + err;
        }
    }

    // ONLINE SZINKRON (A levonás megtörténik)
    pubnub.addListener({
        message: function(event) {
            const adat = event.message;
            if(adat.tipus === "SOUND_FIZETES_OK") {
                egyenleg -= adat.osszeg;
                document.getElementById('egyenlegKijelzo').innerText = egyenleg;
                document.getElementById('statusz').innerHTML = `💸 <b>Tranzakció Sikeres!</b><br>Levonva: ${adat.osszeg} Ft hangalapú hitelesítéssel.`;
            }
        }
    });
</script>

</body>
</html>
