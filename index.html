<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milney Bluetooth Cash</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 360px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #00adb5; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #252525; border: 1px solid #00adb5; color: white; border-radius: 8px; font-size: 16px; text-align: center; }
        button { width: 95%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-term { background: #00adb5; color: white; }
        .btn-pay { background: #393e46; color: white; border: 2px solid #00adb5; }
        #statusz { margin-top: 20px; padding: 15px; background: #252525; border-radius: 8px; font-size: 14px; min-height: 40px; border-left: 5px solid #00adb5; }
        .egyenleg { font-size: 24px; color: #28c76f; font-weight: bold; margin: 15px 0; }
        #jel-ero { color: #ff9f43; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>Milney Bluetooth Pay</h1>
    
    <div class="egyenleg">Egyenleg: <span id="egyenlegKijelzo">5000</span> Ft</div>
    <div id="jel-ero">Távolság érzékelő: Keresés...</div>
    <hr style="border-color: #333;">

    <h3>[ 1. Telefon: TERMINÁL ]</h3>
    <input type="number" id="osszegInput" placeholder="Összeg (Ft)" value="1000">
    <button class="btn-term" onclick="inditTerminal()">Bluetooth Terminál Indítása</button>

    <h3>[ 2. Telefon: FIZETŐ ]</h3>
    <button class="btn-pay" onclick="inditFizeto()">Fizetőként bejelentkezés</button>

    <div id="statusz">Indítsd el a rendszert a gombokkal!</div>
</div>

<script>
    let egyenleg = 5000;
    let szerep = "none";
    let beirtOsszeg = 0;

    // Online valós idejű kommunikáció
    const pubnub = new PubNub({
        publishKey: "pub-c-cb677fa9-0d1a-4933-bfdd-a01c80145217",
        subscribeKey: "sub-c-497df57a-9bb7-11eb-bc5a-a2ff7d4dfbf7",
        uuid: "bt_user_" + Math.floor(Math.random() * 1000)
    });
    pubnub.subscribe({ channels: ['milney_bt_channel'] });

    // 1. TELEFON: TERMINÁL INDÍTÁSA
    async function inditTerminal() {
        beirtOsszeg = parseInt(document.getElementById('osszegInput').value);
        if(!beirtOsszeg || beirtOsszeg <= 0) { alert("Írj be összeget!"); return; }
        
        szerep = "terminal";
        document.getElementById('statusz').innerHTML = "⏳ Keresem a közeli fizető telefont Bluetooth-on...";

        try {
            // Megkérjük a Chrome-ot, hogy pásztázza a közeli Bluetooth eszközöket
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true
            });
            
            document.getElementById('statusz').innerHTML = `🔄 Kapcsolódás hozzá: ${device.name}...`;

            // Trükk: Amikor létrejön a fizikai közelség, küldünk egy jelet a hálózatnak
            pubnub.publish({
                channel: 'milney_bt_channel',
                message: { tipus: "BT_FIZETES_KERELEM", osszeg: beirtOsszeg }
            });

        } catch (error) {
            document.getElementById('statusz').innerHTML = "Bluetooth hiba: " + error;
        }
    }

    // 2. TELEFON: FIZETŐ MÓD
    function inditFizeto() {
        szerep = "fizeto";
        document.getElementById('statusz').innerHTML = "📲 Fizető mód aktív. Tedd a terminál közelébe (5-10 cm)...";
    }

    // HÁTTÉR LOGIKA (PubNub hálózaton)
    pubnub.addListener({
        message: function(event) {
            const adat = event.message;

            if (szerep === "fizeto" && adat.tipus === "BT_FIZETES_KERELEM") {
                if (egyenleg >= adat.osszeg) {
                    egyenleg -= adat.osszeg;
                    document.getElementById('egyenlegKijelzo').innerText = egyenleg;
                    document.getElementById('statusz').innerHTML = `✅ <b>Sikeres fizetés követséggel!</b><br>Levonva: ${adat.osszeg} Ft a közeli terminálnak.`;
                    
                    pubnub.publish({
                        channel: 'milney_bt_channel',
                        message: { tipus: "BT_NYUGTA", statusz: "OK", levont: adat.osszeg }
                    });
                } else {
                    document.getElementById('statusz').innerHTML = "❌ Nincs elég egyenleg!";
                }
            }

            if (szerep === "terminal" && adat.tipus === "BT_NYUGTA") {
                document.getElementById('statusz').innerHTML = `💰 <b>Sikeres tranzakció!</b><br>${adat.levont} Ft sikeresen levonva a közeli telefonról.`;
                szerep = "none";
            }
        }
    });
</script>

</body>
</html>
